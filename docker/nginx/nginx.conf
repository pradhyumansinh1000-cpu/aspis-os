events {
    worker_processes auto;
    worker_connections 1024;
}

http {
    # ── Basic Settings ─────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;          # Don't expose Nginx version

    # ── Buffer sizes ────────────────────────────────────────────────────────────
    # Large client_max_body_size for OCR/audio uploads (500MB)
    client_max_body_size 500M;
    client_body_timeout 300s;
    proxy_read_timeout 300s;    # Long timeout for AI inference responses

    # ── Gzip Compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ── Rate Limiting ──────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=5r/m;

    # ── Upstream (FastAPI) ─────────────────────────────────────────────────────
    upstream fastapi_backend {
        server api:8000;
        # Add more servers here for horizontal scaling:
        # server api2:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Upload endpoints get stricter rate limit
        location ~* ^/api/v1/(ocr|speech)/upload {
            limit_req zone=uploads burst=3 nodelay;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_request_buffering off;    # Stream uploads directly
        }

        # Health check (no auth, no rate limit)
        location /health {
            proxy_pass http://fastapi_backend;
        }

        # Docs (development only — remove in production)
        location /docs {
            proxy_pass http://fastapi_backend;
        }

        location /openapi.json {
            proxy_pass http://fastapi_backend;
        }
    }
}
