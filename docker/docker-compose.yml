version: "3.9"

# ─── Network ──────────────────────────────────────────────────────────────────
# All services communicate on the internal "studentai" network
# Only Nginx is exposed to the outside world on port 80/443
networks:
  studentai:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads_data:
  ollama_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: studentai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Performance tuning for moderate workload
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # Remove in production (only expose internally)
    networks:
      - studentai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: studentai_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - studentai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: studentai_api
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
      --http httptools
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    volumes:
      - uploads_data:/app/uploads
      - ../app:/app/app   # Hot reload in development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - studentai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery Worker (AI Heavy tasks: OCR, STT, Reports) ─────────────────────
  celery_ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: studentai_celery_ai
    restart: unless-stopped
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --queues=ai_heavy
      --concurrency=2
      --max-tasks-per-child=50
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - studentai

  # ── Celery Worker (Analytics: lightweight aggregation tasks) ───────────────
  celery_analytics:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: studentai_celery_analytics
    restart: unless-stopped
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --queues=analytics,default
      --concurrency=4
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - studentai

  # ── Celery Beat (Scheduled tasks: weekly analytics recompute) ─────────────
  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: studentai_celery_beat
    restart: unless-stopped
    command: >
      celery -A app.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - studentai

  # ── Flower (Celery Monitoring UI) ─────────────────────────────────────────
  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: studentai_flower
    restart: unless-stopped
    command: >
      celery -A app.celery_app flower
      --port=5555
      --basic_auth=admin:flowerpassword
    env_file:
      - ../.env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - studentai

  # ── Ollama (Self-hosted Llama 70B) ────────────────────────────────────────
  # Comment this out and set OLLAMA_BASE_URL externally if running Ollama separately
  ollama:
    image: ollama/ollama:latest
    container_name: studentai_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - studentai
    # Uncomment for GPU acceleration (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Nginx (Reverse Proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: studentai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - studentai
