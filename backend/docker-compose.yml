version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aspis_postgres
    restart: always
    environment:
      POSTGRES_USER: aspis_user
      POSTGRES_PASSWORD: aspis_password
      POSTGRES_DB: aspis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aspis_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
